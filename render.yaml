services:
  - type: web
    name: rs-rating-pro
    runtime: python
    buildCommand: "pip install -e . && python -m rs_rating.cli --update && python -m rs_rating.cli --update --market india"
    startCommand: "uvicorn rs_rating.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
