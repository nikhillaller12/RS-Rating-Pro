name: Daily Benchmark Update

on:
  schedule:
    - cron: "0 1 * * *"   # 1:00 AM UTC every day (6:30 AM IST)
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger benchmark update on Render
        run: |
          echo "Calling /admin/update on deployed app..."
          curl --fail --silent --show-error \
            --request POST \
            --header "X-Update-Token: ${{ secrets.UPDATE_SECRET }}" \
            "${{ secrets.RENDER_APP_URL }}/admin/update"
          echo ""
          echo "Benchmark update triggered successfully."
